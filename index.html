      --text-dark: #ededed;

      --era2: #7928ca;
      --era3: #50e3c2;
      --era4: #f5a623;
      --era5: #ff0080;
    }
    
    [data-theme="light"] {
      --bg: var(--bg-light);
      --surface: var(--surface-light);
      --text: var(--text-light);
      color-scheme: light;
    }
    
    [data-theme="dark"] {
      --bg: var(--bg-dark);
      --surface: var(--surface-dark);
      --text: var(--text-dark);
      color-scheme: dark;
    }
    
    html {
      scroll-behavior: smooth;
    }
    
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Crimson Text', serif;
      line-height: 1.8;
      transition: background 0.3s, color 0.3s;
      direction: rtl;
    }
    
    /* ---- HOME SCREEN ---- */
    .home-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
      text-align: center;
      gap: 3rem;
    }
    
    .home-screen.hidden {
      display: none;
    }
    
    .logo {
      font-size: 2.5rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 1rem;
    }
    
    .home-title {
      font-size: clamp(2rem, 8vw, 4rem);
      font-weight: 700;
      max-width: 800px;
      line-height: 1.2;
      margin-bottom: 1rem;
    }
    
    .home-subtitle {
      font-size: 1.3rem;
      opacity: 0.7;
      max-width: 600px;
      margin-bottom: 2rem;
    }
    
    .enter-btn {
      padding: 1rem 2.5rem;
      font-size: 1.2rem;
      border: 2px solid var(--text);
      background: transparent;
      color: var(--text);
      cursor: pointer;
      transition: all 0.3s;
      font-family: 'Crimson Text', serif;
      letter-spacing: 0.05em;
    }
    
    .enter-btn:hover {
      background: var(--text);
      color: var(--bg);
    }

      top: 1rem;
      right: 1rem;
      z-index: 999;
      display: flex;
      gap: 0.8rem;
      flex-direction: row-reverse;
    }

      padding: 0.6rem 1.2rem;
      background: var(--surface);
      border: 2px solid var(--text);
      color: var(--text);
      cursor: pointer;
      font-size: 0.95rem;
      font-family: 'Space Mono', monospace;
      font-weight: 600;
      transition: all 0.3s;
    }
    
    button.control-btn:hover {
      background: var(--text);
      color: var(--bg);
    }

      min-height: 100vh;
      background: var(--bg);
    }
    
    .artifact-view.active {
      display: flex;
      flex-direction: column;
    }

      overflow-x: auto;
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;

      border: 2px solid var(--text);

      cursor: pointer;
      font-family: 'Space Mono', monospace;
      font-size: 0.95rem;
      transition: all 0.3s;
      color: var(--text);

      background: var(--text);
      color: var(--bg);
    }
    
    .timeline-item:hover {
      background: var(--text);
      color: var(--bg);
    }

      gap: 3rem;
      padding: 4rem;
      max-width: 1400px;
      margin: 0 auto;

        padding: 2rem;
        gap: 2rem;
      }

      padding: 2rem;
      text-align: center;

      line-height: 1;
    }

      line-height: 1.8;
      margin-bottom: 2rem;
    }

      gap: 1.5rem;
      padding: 2rem;
      background: var(--surface);
      border: 1px solid var(--text);
      border-radius: 4px;

      flex-direction: column;
    }
    
    .fact-label {

      color: var(--text);

</head>

const translations = {
  ar: {
    'logo': 'حفريات',
    'homeTitle': 'حفريات الإنترنت الاجتماعي',
    'homeSubtitle': 'استكشف 47 سنة من تاريخ الشبكات الاجتماعية والتواصل الرقمي',
    'enterBtn': 'ENTER →',
    'prevBtn': '← PREV',
    'nextBtn': 'NEXT →',
    'footerTitle': 'حفريات الإنترنت الاجتماعي · 1978–الآن',
    'footerCredits': '🎨 الموقع من إبراهيم (IBRA)',
    'footerContributors': '💪 مساعدة المحتوى من جمال (chak.alah)',
  },
  en: {
    'logo': 'ARTIFACTS',
    'homeTitle': 'Artifacts of the Social Internet',
    'homeSubtitle': 'Explore 47 years of social networks and digital communication',
    'enterBtn': 'ENTER →',
    'prevBtn': '← PREV',
    'nextBtn': 'NEXT →',
    'footerTitle': 'Artifacts of the Social Internet · 1978–Present',
    'footerCredits': '🎨 Website by Ibrahim (IBRA)',
    'footerContributors': '💪 Content help by Jamal (chak.alah)',
  }
};

function updateUI() {
  Object.keys(translations[currentLang]).forEach(key => {
    const el = document.getElementById(key);
    if (el) el.textContent = translations[currentLang][key];
  });
}

function enterArtifacts() {
  document.getElementById('homeScreen').classList.add('hidden');
  document.getElementById('artifactView').classList.add('active');
  renderTimeline();
  showArtifact(0);
}

function renderTimeline() {
  const timeline = document.getElementById('timeline');
  timeline.innerHTML = '';
  const years = [...new Set(artifacts.map(a => a.year))].sort((a, b) => a - b);
  years.forEach((year, idx) => {
    const btn = document.createElement('button');
    btn.className = 'timeline-item';
    btn.textContent = year;
    btn.onclick = () => {
      const firstInYear = artifacts.findIndex(a => a.year === year);
      showArtifact(firstInYear);
    };
    timeline.appendChild(btn);
  });
}

function showArtifact(idx) {
  currentIndex = idx;
  const art = artifacts[idx];
  
  const title = currentLang === 'ar' ? art.title_ar : art.title_en;
  const desc = currentLang === 'ar' ? art.desc_ar : art.desc_en;
  const type = currentLang === 'ar' ? art.type_ar : art.type_en;
  
  document.getElementById('artifactYear').textContent = art.year;
  document.getElementById('artifactTitle').textContent = title;
  document.getElementById('artifactType').textContent = type;
  document.getElementById('artifactEmoji').textContent = art.emoji;
  document.getElementById('artifactDescription').textContent = desc;
  document.getElementById('currentIndex').textContent = idx + 1;
  document.getElementById('totalCount').textContent = artifacts.length;
  
  // Update facts
  let factsHTML = '';
  art.facts.forEach(fact => {
    factsHTML += `<div class="fact-item">
      <div class="fact-label">${fact[0]}</div>
      <div class="fact-value">${fact[1]}</div>
    </div>`;
  });
  document.getElementById('artifactFacts').innerHTML = factsHTML;
  
  // Update buttons
  document.getElementById('prevBtn').disabled = idx === 0;
  document.getElementById('nextBtn').disabled = idx === artifacts.length - 1;
  
  // Update timeline
  document.querySelectorAll('.timeline-item').forEach((item, i) => {
    item.classList.remove('active');
    if (item.textContent === art.year) item.classList.add('active');
  });
}

function nextArtifact() {
  if (currentIndex < artifacts.length - 1) {
    showArtifact(currentIndex + 1);
  }
}

function previousArtifact() {
  if (currentIndex > 0) {
    showArtifact(currentIndex - 1);
  }
}

function toggleLanguage() {
  currentLang = currentLang === 'ar' ? 'en' : 'ar';
  document.documentElement.lang = currentLang;
  document.body.dir = currentLang === 'ar' ? 'rtl' : 'ltr';
  document.getElementById('lang-toggle').textContent = currentLang === 'ar' ? 'EN' : 'AR';
  updateUI();
  if (document.getElementById('artifactView').classList.contains('active')) {
    showArtifact(currentIndex);
  }
  localStorage.setItem('language', currentLang);
}

function toggleTheme() {
  currentTheme = currentTheme === 'light' ? 'dark' : 'light';
  document.body.dataset.theme = currentTheme;
  document.getElementById('theme-toggle').textContent = currentTheme === 'light' ? '☀️' : '🌙';
  localStorage.setItem('theme', currentTheme);
}

// Keyboard Navigation
document.addEventListener('keydown', (e) => {
  if (document.getElementById('artifactView').classList.contains('active')) {
    if (e.key === 'ArrowRight') nextArtifact();
    if (e.key === 'ArrowLeft') previousArtifact();
  }
});

// Init
window.addEventListener('DOMContentLoaded', () => {
  currentLang = localStorage.getItem('language') || 'ar';
  currentTheme = localStorage.getItem('theme') || 'light';
  document.body.dataset.theme = currentTheme;
  document.body.dir = currentLang === 'ar' ? 'rtl' : 'ltr';
  document.documentElement.lang = currentLang;
  document.getElementById('lang-toggle').textContent = currentLang === 'ar' ? 'EN' : 'AR';
  document.getElementById('theme-toggle').textContent = currentTheme === 'light' ? '☀️' : '🌙';
  updateUI();
});
</script>
